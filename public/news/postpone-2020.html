      <h1>关于“第三十四届中国国际塑料橡胶工业展览会 CHINAPLAS”延期举办及变更地点的通知</h1>
      <div class="nv-meta"><time datetime="2020-04">2020-04</time></div>
      <div class="nv-cover"><img src="/assets/news/expo-postpone-2021.jpg" alt="关于“第三十四届中国国际塑料橡胶工业展览会 CHINAPLAS”延期举办及变更地点的通知"></div>
      <div class="nv-body">
        <p>自新冠肺炎疫情发生以来，大家都密切关注疫情发展以及相关防控信息。目前疫情在中国已基本受控，但海外态势仍然严峻。</p>
        <p>经慎重考虑，第三十四届 CHINAPLAS 国际橡塑展再度延期，改于 2021 年 4 月 13 日至 16 日举办，展出地点变更为深圳国际会展中心。</p>
