      <h1>现代管业专访海狮科技总经理罗锡阳先生</h1>
      <div class="nv-meta"><time datetime="2020-08">2020-08</time></div>
      
      <div class="nv-cover"><img src="/assets/news/interview-2020.jpg" alt="现代管业专访海狮科技总经理罗锡阳先生"></div>
      <div class="nv-body">
        <p>近日，现代管业融媒体中心陪同中农水协现代管业专委会秘书处走访会员单位，为塑料制造业传递优秀品牌，特别策划了“企业品牌访谈录”系列报道。</p>
        <p>7 月 24 日，笔者在广州科学城有幸采访到十多年来一直致力于管道行业工业控制系统研发、生产、销售的高新企业创始人——广州海狮软件科技有限公司总经理罗锡阳先生，听听他是如何通过米重控制、在线检测等工业控制系统，为管道行业产品质量保驾护航的。</p>
      </div>
      <a class="nv-back nv-back--btm" href="/#news">&larr; 返回海狮动态</a>
