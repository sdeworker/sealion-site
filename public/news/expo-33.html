        <p>CHINAPLAS 国际橡塑展伴随着中国塑料及橡胶行业成长逾 33 年，至今已发展成为亚洲最具规模之橡塑业展会，并对中国橡塑业的发展产生了积极的推动作用。</p>
        <p>目前，「CHINAPLAS 国际橡塑展」不单是亚洲最大型的塑料及橡胶业展览会，业内人士更公认其影响力仅次于全球第一大橡塑展的德国「K 展」，成为橡塑业的世界第二大展会。</p>
